spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/healthshield}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

file:
  upload:
    dir: ${FILE_UPLOAD_DIR:/var/app/uploads/claims}

server:
  port: ${PORT:8080}
