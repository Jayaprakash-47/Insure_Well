spring:
  application:
    name: Corporate_Health_Insurance

  # ── Database ──
  datasource:
    url: jdbc:h2:mem:healthshielddb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── H2 Console ──
  h2:
    console:
      enabled: true
      path: /h2-console

  # ── JPA ──
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── Gmail SMTP ──
  # mail:
  #   host: smtp.gmail.com
  #   port: 587
  #   username: jayaprakashpuntikura@gmail.com
  #   password: nytt owrp rwnz qwlg
  #   properties:
  #     mail:
  #       smtp:
  #         auth: true
  #         starttls:
  #           enable: true
  #           required: true

  # ── Async thread pool ──
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 25
    scheduling:
      pool:
        size: 5

  # ── File Upload Limits (FIX: allows Aadhaar + Health Report uploads) ──
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 25MB

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:your-jwt-secret-here}
  expiration: 86400000
  refresh-expiration-days: 7

razorpay:
  key-id: ${RAZORPAY_KEY_ID:your-razorpay-key-id}
  key-secret: ${RAZORPAY_KEY_SECRET:your-razorpay-key-secret}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:your-anthropic-api-key}

# ── KYC Sandbox (sandbox.co.in) ──
kyc:
  sandbox:
    baseUrl: https://api.sandbox.co.in
    apiKey: ${KYC_SANDBOX_API_KEY:your-kyc-api-key}
    secret: ${KYC_SANDBOX_SECRET:your-kyc-secret}

# ── Gemini AI (Google Cloud Vertex AI) ──
gemini:
  project-id: ${GEMINI_PROJECT_ID:your-gemini-project-id}
  location: us-central1
  model-id: gemini-2.5-flash
  api-key: ${GEMINI_API_KEY:your-gemini-api-key}
# ── Springdoc / Swagger ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

n8n:
  webhook:
    email: ${N8N_WEBHOOK_EMAIL:https://your-n8n-instance.app.n8n.cloud/webhook/send-email}
    secret: ${N8N_WEBHOOK_SECRET:your-n8n-webhook-secret}
# ── Server ──
server:
  port: 8080

# ── File upload directory ──
file:
  upload:
    dir: uploads/claims