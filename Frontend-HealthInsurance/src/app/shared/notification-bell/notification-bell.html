<div class="notif-wrapper">

  <!-- Bell Button — inline styles guarantee visibility on dark navbar -->
  <button
    class="notif-btn"
    (click)="togglePanel($event)"
    title="Notifications"
    style="
      position: relative;
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: rgba(255,255,255,0.13);
      border: 1.5px solid rgba(255,255,255,0.28);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: all 0.2s ease;
      flex-shrink: 0;
    "
  >
    <!-- Material Icon — hardcoded white, always visible -->
    <span
      class="material-icons"
      style="font-size: 22px; color: #ffffff; line-height: 1; display: block;"
    >notifications</span>

    <!-- Unread badge using *ngIf pattern -->
    <ng-container *ngIf="unreadCount$ | async as count">
      <span
        *ngIf="count > 0"
        style="
          position: absolute;
          top: -5px;
          right: -5px;
          min-width: 18px;
          height: 18px;
          background: #ef4444;
          color: white;
          border-radius: 9px;
          font-size: 10px;
          font-weight: 800;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0 4px;
          border: 2px solid #1a0006;
          box-shadow: 0 2px 8px rgba(239,68,68,0.6);
          font-family: sans-serif;
        "
      >{{ count > 9 ? '9+' : count }}</span>
    </ng-container>
  </button>

  <!-- Dropdown panel -->
  <div
    *ngIf="isOpen"
    class="notif-panel"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="notif-header">
      <div class="notif-header-title">
        <span>Notifications</span>
        <ng-container *ngIf="unreadCount$ | async as count">
          <span *ngIf="count > 0" class="notif-count-chip">{{ count }} new</span>
        </ng-container>
      </div>
      <button class="notif-mark-read" (click)="markAllRead()">Mark all read</button>
    </div>

    <!-- List -->
    <div class="notif-list">
      <ng-container *ngIf="notifications$ | async as list">
        <div *ngIf="list.length === 0" class="notif-empty">
              <span style="font-family:'Material Icons'; font-size:2.2rem; color:#cbd5e1; display:block; margin-bottom:10px;">notifications_off</span>
              <p>No notifications yet</p>
            </div>
        <ng-container *ngIf="list.length > 0">
          <div
            *ngFor="let n of list"
            class="notif-item"
            [class.unread]="!n.read"
          >
            <span class="notif-type-icon">{{ getIcon(n.type) }}</span>
            <div class="notif-body">
              <p class="notif-msg">{{ n.message }}</p>
              <span class="notif-time">{{ n.createdAt | date: 'dd MMM, h:mm a' }}</span>
            </div>
            <span *ngIf="!n.read" class="notif-unread-dot"></span>
          </div>
        </ng-container>
      </ng-container>
    </div>
  </div>

</div>
