<!-- FILE: src/app/shared/dark-mode-toggle/dark-mode-toggle.component.html -->

<button
  class="dark-mode-fab"
  [attr.data-tooltip]="(isDark$ | async) ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
  [attr.aria-label]="(isDark$ | async) ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
  (click)="toggle()"
>
  <span class="material-icons fab-icon">
    {{ (isDark$ | async) ? 'light_mode' : 'dark_mode' }}
  </span>
</button>
