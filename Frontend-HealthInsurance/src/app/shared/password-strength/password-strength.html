<div *ngIf="password" style="margin-top: 6px">
  <div style="display: flex; gap: 4px; margin-bottom: 4px">
    <div
      *ngFor="let i of [1, 2, 3, 4]"
      style="height: 4px; flex: 1; border-radius: 2px; transition: background 0.3s"
      [style.background]="i <= strength ? strengthColor : '#e5e7eb'"
    ></div>
  </div>
  <small [style.color]="strengthColor" style="font-size: 12px">
    {{ strengthLabel }}
    <span *ngIf="strength < 4" style="color: #9ca3af"> — {{ hint }} </span>
  </small>
</div>
