<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <a routerLink="/" class="auth-brand">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#800020"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          <path d="M9 12l2 2 4-4" />
        </svg>
        InsureWell
      </a>
      <h1>Welcome Back</h1>
      <p>Sign in to manage your policies and claims</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-icon-wrapper">
          <span class="material-icons input-icon">email</span>
          <input
            id="email"
            type="email"
            class="form-control form-control-with-icon"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
            autocomplete="email"
            (blur)="onBlur('email')"
            [class.error]="errors.email && touched.email"
          />
        </div>
        @if (errors.email && touched.email) {
          <span class="error-message">{{ errors.email }}</span>
        }
      </div>

      <div class="form-group">
        <!-- ── Label row with Forgot Password link ── -->
        <div class="label-row">
          <label for="password" style="margin: 0">Password</label>
          <a routerLink="/forgot-password" class="forgot-link">
            Forgot password?
          </a>
        </div>

        <!-- ── Password input with Material Icons show/hide toggle ── -->
        <div class="input-icon-wrapper">
          <span class="material-icons input-icon">lock</span>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-control form-control-with-icon form-control-with-toggle"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            (blur)="onBlur('password')"
            [class.error]="errors.password && touched.password"
          />
          <button
            type="button"
            class="toggle-password-btn"
            (click)="showPassword = !showPassword"
            [title]="showPassword ? 'Hide password' : 'Show password'"
          >
            <span class="material-icons">
              {{ showPassword ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>

        @if (errors.password && touched.password) {
          <span class="error-message">{{ errors.password }}</span>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span> Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
